version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: ambulance_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ambulance_qr
    expose:
      - "27017"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ambulance_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./server/.env
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5010:5000"
    networks:
      - app_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ambulance_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8085:80"
    networks:
      - app_net

volumes:
  mongo_data:
  uploads_data:

networks:
  app_net:
    driver: bridge